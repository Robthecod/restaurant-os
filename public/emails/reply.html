<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Roux</title>
  <style>
    body { margin: 0; padding: 0; background: #f8fafc; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; }
    .container { max-width: 580px; margin: 0 auto; padding: 32px 20px; }
    .card { background: #ffffff; border-radius: 16px; overflow: hidden; box-shadow: 0 4px 24px rgba(0,0,0,0.06); }
    .header-mini { background: linear-gradient(135deg, #d97706, #b45309); padding: 24px 32px; text-align: center; }
    .header-mini .logo { font-size: 2rem; }
    .body { padding: 32px; }
    .body h2 { font-size: 1.1rem; font-weight: 700; color: #0f172a; margin: 0 0 12px; }
    .body p { font-size: 0.92rem; color: #475569; line-height: 1.7; margin: 0 0 16px; }
    .message-box { background: #fffbeb; border-left: 4px solid #d97706; border-radius: 4px 12px 12px 4px; padding: 16px 20px; margin: 20px 0; }
    .message-box p { color: #92400e; font-style: italic; margin: 0; }
    .btn { display: inline-block; background: linear-gradient(135deg, #d97706, #b45309); color: #fff !important; text-decoration: none; padding: 12px 28px; border-radius: 10px; font-weight: 700; font-size: 0.9rem; }
    .divider { height: 1px; background: #e2e8f0; margin: 28px 0; }
    .footer-text { font-size: 0.8rem; color: #94a3b8; line-height: 1.6; text-align: center; padding: 24px 32px; }
    .footer-text a { color: #d97706; text-decoration: none; }
    @media (max-width: 480px) { .container { padding: 16px 12px; } .body { padding: 24px 18px; } }
  </style>
</head>
<body>
  <div class="container">
    <div class="card">
      <div class="header-mini">
        <div class="logo">🥘</div>
      </div>
      <div class="body">
        <h2>Hey {{name}},</h2>
        <p>{{message}}</p>

        {{#actionUrl}}
        <div style="text-align:center;margin:24px 0;">
          <a href="{{actionUrl}}" class="btn">{{actionText}}</a>
        </div>
        {{/actionUrl}}

        <div class="divider"></div>
        <p style="font-size:0.85rem;color:#64748b;">Have more questions? Just reply to this email — we're happy to help!</p>
        <p style="font-size:0.85rem;color:#64748b;">Best,<br><strong>The Roux Team</strong> 🧑‍🍳</p>
      </div>
      <div class="footer-text">
        <p>Roux Restaurant Engine · <a href="mailto:support@roux.app">support@roux.app</a><br>
        {{restaurant}} · {{email}}</p>
      </div>
    </div>
  </div>
</body>
</html>
