<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Manager Panel — Admin</title>
  <link rel="manifest" href="/manifest.json">
  <link rel="stylesheet" href="/css/style.css">
  <link rel="stylesheet" href="/css/manager.css">
</head>
<body>
  <!-- ─── Header ─── -->
  <header class="mgr-header">
    <div class="mgr-header-left">
      <span class="mgr-title">📊 Manager Panel</span>
      <span class="mgr-subtitle" id="mgrSubtitle">Menu Administration</span>
    </div>
    <div class="mgr-header-right">
      <span class="sync-status" id="syncStatus">
        <span class="sync-dot"></span>
        <span id="syncLabel">Connected</span>
      </span>
      <a href="/email-inbox.html" class="inbox-link" target="_blank" title="Email Inbox">📬 Inbox</a>
      <span class="connection-dot" id="connDot" title="Connection Status"></span>
    </div>
  </header>

  <!-- ─── Tab Navigation ─── -->
  <div class="mgr-tabs">
    <button class="mgr-tab active" data-tab="menu">📋 Menu</button>
    <button class="mgr-tab" data-tab="analytics">📈 Analytics</button>
  </div>

  <!-- ─── Main Layout (Menu View) ─── -->
  <div class="mgr-layout" id="menuView">
    <!-- ─── Left Panel: Add Item Form ─── -->
    <section class="mgr-panel mgr-form-panel reveal-spring">
      <h2 class="panel-title">➕ Add Menu Item</h2>
      <form class="menu-form" id="menuForm">
        <div class="form-group">
          <label for="itemCategory">Category</label>
          <select id="itemCategory" required>
            <option value="starters">Starters</option>
            <option value="mains" selected>Mains</option>
            <option value="drinks">Drinks</option>
          </select>
        </div>

        <div class="form-group">
          <label for="itemName">Item Name</label>
          <input
            type="text"
            id="itemName"
            placeholder="e.g., Grilled Salmon"
            required
            autocomplete="off"
          />
        </div>

        <div class="form-group">
          <label for="itemPrice">Price (₹)</label>
          <input
            type="number"
            id="itemPrice"
            placeholder="e.g., 14.99"
            step="0.01"
            min="0.01"
            required
          />
        </div>

        <button type="submit" class="btn btn-primary btn-lg w-full">
          ➕ Add to Menu
        </button>
      </form>

      <div class="mgr-divider"></div>

      <!-- ─── Quick Stats ─── -->
      <div class="quick-stats">
        <div class="quick-stat">
          <span class="qs-value" id="qsTotal">0</span>
          <span class="qs-label">Total Items</span>
        </div>
        <div class="quick-stat">
          <span class="qs-value" id="qsActive">0</span>
          <span class="qs-label">Available</span>
        </div>
        <div class="quick-stat">
          <span class="qs-value" id="qsCategories">3</span>
          <span class="qs-label">Categories</span>
        </div>
      </div>
    </section>

    <!-- ─── Right Panel: Live Menu Preview ─── -->
    <section class="mgr-panel mgr-preview-panel reveal-spring">
      <h2 class="panel-title">📋 Live Menu Preview</h2>
      <p class="panel-desc">Changes broadcast instantly to all connected waiters</p>

      <div class="menu-preview" id="menuPreview">
        <div class="preview-loading">Loading menu...</div>
      </div>
    </section>
  </div>

  <!-- ─── Analytics View ─── -->
  <div class="analytics-view" id="analyticsView" style="display:none;">
    <div class="analytics-loading" id="analyticsLoading">
      <div class="preview-loading">📊 Loading analytics...</div>
    </div>
    <div class="analytics-content" id="analyticsContent" style="display:none;">
      <!-- Summary cards -->
      <div class="analytics-summary" id="analyticsSummary"></div>

      <!-- Period breakdown -->
      <div class="analytics-periods" id="analyticsPeriods"></div>

      <!-- Two-column grid: Top Dishes + Time of Day -->
      <div class="analytics-grid">
        <div class="analytics-card reveal-spring" id="analyticsTopDishes">
          <h3 class="analytics-card-title">🏆 Top Selling Dishes</h3>
          <div class="top-dishes-list" id="topDishesList"></div>
        </div>
        <div class="analytics-card reveal-spring" id="analyticsTimeSlots">
          <h3 class="analytics-card-title">🕐 Sales by Time of Day</h3>
          <div class="time-slots-list" id="timeSlotsList"></div>
        </div>
      </div>
    </div>
  </div>

  <!-- ─── Edit Modal ─── -->
  <div class="modal-overlay" id="editModal">
    <div class="modal-content modal-edit">
      <div class="modal-header">
        <h3>✏️ Edit Menu Item</h3>
      </div>
      <div class="modal-body">
        <div class="form-group">
          <label for="editName">Item Name</label>
          <input type="text" id="editName" required />
        </div>
        <div class="form-group">
          <label for="editPrice">Price (₹)</label>
          <input type="number" id="editPrice" step="0.01" min="0.01" required />
        </div>
        <div class="form-group">
          <label class="switch-label">
            <input type="checkbox" id="editAvailable" checked />
            <span class="switch-track">
              <span class="switch-thumb"></span>
            </span>
            <span>Available</span>
          </label>
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-secondary" id="editCancel">Cancel</button>
        <button class="btn btn-primary" id="editSave">💾 Save Changes</button>
      </div>
    </div>
  </div>

  <!-- ─── Toast Container ─── -->
  <div class="toast-container" id="toastContainer"></div>

  <!-- ─── Scripts ─── -->
  <script src="/js/motion.js"></script>
  <script>
    // ─── Skiper UI-inspired Motion Effects ────────────────────────
    (function() {
      if (window.matchMedia('(prefers-reduced-motion: reduce)').matches) return;

      document.addEventListener('DOMContentLoaded', function() {
        // Hover lift on menu preview panels and analytics cards
        MotionEffects.tilt('.mgr-panel', { maxTilt: 2, perspective: 1200, scale: 1.002 });
        MotionEffects.tilt('.analytics-card', { maxTilt: 3, perspective: 1000, scale: 1.005 });

        // Spring reveal on panels
        MotionEffects.scrollReveal('.mgr-panel, .analytics-card', { threshold: 0.1 });
      });
    })();
  </script>

  <script src="/socket.io/socket.io.js"></script>
  <script src="/js/socket-client.js"></script>
  <script src="/js/manager.js"></script>
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('/sw.js');
    }
  </script>
</body>
</html>
