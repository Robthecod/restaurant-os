<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Waiter Pad — Ordering</title>
  <link rel="manifest" href="/manifest.json">
  <link rel="stylesheet" href="/css/style.css">
  <link rel="stylesheet" href="/css/waiter.css">
</head>
<body>
  <!-- ─── Category Drawer Overlay ─── -->
  <div class="drawer-overlay" id="drawerOverlay"></div>

  <!-- ─── Category Drawer (slide-in from left) ─── -->
  <nav class="category-drawer" id="categoryDrawer">
    <div class="drawer-header">
      <span class="drawer-title">📂 Menu</span>
      <button class="drawer-close" id="drawerClose" title="Close">✕</button>
    </div>
    <div class="drawer-tabs" id="drawerTabs">
      <button class="drawer-tab active" data-category="starters">
        <span class="drawer-tab-icon">🥟</span>
        <span class="drawer-tab-label">Starters</span>
      </button>
      <button class="drawer-tab" data-category="mains">
        <span class="drawer-tab-icon">🍛</span>
        <span class="drawer-tab-label">Mains</span>
      </button>
      <button class="drawer-tab" data-category="desserts">
        <span class="drawer-tab-icon">🍨</span>
        <span class="drawer-tab-label">Desserts</span>
      </button>
      <button class="drawer-tab" data-category="drinks">
        <span class="drawer-tab-icon">🥤</span>
        <span class="drawer-tab-label">Drinks</span>
      </button>
    </div>
  </nav>

  <!-- ─── Header ─── -->
  <header class="waiter-header">
    <div class="header-left">
      <button class="hamburger-btn" id="hamburgerBtn" title="Menu Categories">☰</button>
      <span class="table-badge" id="tableBadge">Table 01</span>
    </div>
    <div class="header-center">
      <span class="header-category-label" id="headerCategoryLabel">🥟 Starters</span>
    </div>
    <div class="header-right">
      <button class="orders-toggle" id="ordersToggle" title="View Orders">📋 Orders</button>
      <span class="connection-dot" id="connDot" title="Connection Status"></span>
    </div>
  </header>

  <div class="waiter-layout">
    <!-- ─── Main Content (Menu) ─── -->
    <div class="waiter-main">
      <!-- ─── Menu Grid ─── -->
      <section class="menu-grid-container">
        <div class="menu-grid" id="menuGrid"></div>
        <div class="menu-loading" id="menuLoading">Loading menu...</div>
      </section>
    </div>

    <!-- ─── Sidebar: Live Item Tracker ─── -->
    <aside class="waiter-sidebar" id="waiterSidebar">
      <div class="sidebar-header">
        <span class="sidebar-title">📋 Live Tracker</span>
        <button class="sidebar-toggle" id="sidebarToggle" title="Collapse">◀</button>
      </div>
      <div class="sidebar-items" id="sidebarItems">
        <div class="sidebar-empty">
          <span>No active items — place an order to see tracking here</span>
        </div>
      </div>
    </aside>
  </div>

  <!-- ─── Basket Summary ─── -->
  <section class="basket-bar" id="basketBar">
    <div class="basket-info">
      <span class="basket-label">Basket</span>
      <span class="basket-count" id="basketCount">0 items</span>
      <span class="basket-total" id="basketTotal">₹0.00</span>
    </div>
    <button class="btn btn-primary btn-send" id="sendBtn" disabled>
      Send to Kitchen →
    </button>
  </section>

  <!-- ─── Modifier Modal ─── -->
  <div class="modal-overlay" id="modifierModal">
    <div class="modal-content">
      <div class="modal-header">
        <h3 id="modalItemName">Item Name</h3>
        <span class="modal-price" id="modalItemPrice">₹0.00</span>
      </div>
      <div class="modal-body">
        <label for="modifierInput">Special Instructions / Modifiers</label>
        <textarea
          id="modifierInput"
          rows="3"
          placeholder="e.g., No onions, extra spicy, ice on the side..."
        ></textarea>
        <div class="quick-modifiers">
          <button class="quick-mod" data-mod="No onions">No onions</button>
          <button class="quick-mod" data-mod="Extra spicy">Extra spicy</button>
          <button class="quick-mod" data-mod="Less oil">Less oil</button>
          <button class="quick-mod" data-mod="Well done">Well done</button>
          <button class="quick-mod" data-mod="Ice on side">Ice on side</button>
          <button class="quick-mod" data-mod="No ice">No ice</button>
        </div>
        <div class="quantity-control">
          <button class="qty-btn" id="qtyDec">−</button>
          <span class="qty-value" id="qtyValue">1</span>
          <button class="qty-btn" id="qtyInc">+</button>
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-secondary" id="modalSkip">Skip &amp; Add</button>
        <button class="btn btn-primary" id="modalAdd">Add to Basket</button>
      </div>
    </div>
  </div>

  <!-- ─── Basket Modal ─── -->
  <div class="modal-overlay" id="basketModal">
    <div class="modal-content modal-basket">
      <div class="modal-header">
        <h3>🧺 Your Basket</h3>
        <span class="modal-price" id="basketModalTotal">₹0.00</span>
      </div>
      <div class="modal-body">
        <div id="basketItems"></div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-secondary" id="basketClose">Continue Ordering</button>
        <button class="btn btn-primary" id="basketSend">Send to Kitchen →</button>
      </div>
    </div>
  </div>

  <!-- ─── Orders Panel ─── -->
  <div class="modal-overlay" id="ordersModal">
    <div class="modal-content modal-orders">
      <div class="modal-header">
        <h3>📋 Orders — Table <span id="ordersTableNum">01</span></h3>
        <button class="btn-icon" id="ordersClose" title="Close">✕</button>
      </div>
      <div class="modal-body">
        <div class="orders-list" id="ordersList">
          <div class="orders-loading">Loading orders...</div>
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-secondary" id="ordersNewOrder">← New Order</button>
      </div>
    </div>
  </div>

  <!-- ─── Edit Order Modal ─── -->
  <div class="modal-overlay" id="editOrderModal">
    <div class="modal-content modal-edit-order">
      <div class="modal-header">
        <div>
          <h3>✏️ Edit Order #<span id="editOrderId"></span></h3>
          <span class="edit-order-table">Table <span id="editOrderTable"></span></span>
        </div>
        <span class="badge-status" id="editOrderStatus">pending</span>
      </div>
      <div class="modal-body">
        <!-- Current items in the order -->
        <div class="edit-section">
          <label class="edit-section-label">Current Items</label>
          <div id="editOrderItems" class="edit-items-list"></div>
        </div>

        <!-- Add items from menu -->
        <div class="edit-section">
          <label class="edit-section-label">Add Items from Menu</label>
          <div class="edit-category-tabs" id="editCategoryTabs">
            <button class="edit-cat-tab active" data-category="starters">🥟 Starters</button>
            <button class="edit-cat-tab" data-category="mains">🍛 Mains</button>
            <button class="edit-cat-tab" data-category="desserts">🍨 Desserts</button>
            <button class="edit-cat-tab" data-category="drinks">🥤 Drinks</button>
          </div>
          <div class="edit-menu-grid" id="editMenuGrid"></div>
        </div>

        <!-- Quick modifier for new items -->
        <div class="edit-section" id="editAddSection" style="display:none;">
          <label class="edit-section-label">Modifiers for <span id="editAddItemName"></span></label>
          <textarea id="editAddModifier" rows="2" placeholder="e.g., No onions, extra spicy..."></textarea>
          <div class="edit-quick-mods">
            <button class="quick-mod" data-mod="No onions">No onions</button>
            <button class="quick-mod" data-mod="Extra spicy">Extra spicy</button>
            <button class="quick-mod" data-mod="Less oil">Less oil</button>
            <button class="quick-mod" data-mod="Well done">Well done</button>
            <button class="quick-mod" data-mod="Ice on side">Ice on side</button>
            <button class="quick-mod" data-mod="No ice">No ice</button>
          </div>
          <div class="quantity-control">
            <button class="qty-btn" id="editAddQtyDec">−</button>
            <span class="qty-value" id="editAddQtyValue">1</span>
            <button class="qty-btn" id="editAddQtyInc">+</button>
          </div>
          <button class="btn btn-primary" id="editAddConfirm" style="margin-top:12px;width:100%;">Add to Order</button>
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-secondary" id="editOrderCancel">Cancel</button>
        <button class="btn btn-primary" id="editOrderSave">💾 Save Changes</button>
      </div>
    </div>
  </div>

  <!-- ─── Toast Container ─── -->
  <div class="toast-container" id="toastContainer"></div>

  <!-- ─── Scripts ─── -->
  <script src="/socket.io/socket.io.js"></script>
  <script src="/js/socket-client.js"></script>
  <script src="/js/waiter.js"></script>
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('/sw.js');
    }
  </script>
</body>
</html>
